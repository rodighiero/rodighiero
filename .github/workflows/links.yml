name: Check links

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
      - run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production
      - uses: lycheeverse/lychee-action@v2
        id: lychee
        with:
          jobSummary: false
          args: >-
            --no-progress
            --accept 200,202,206,302,403,429,999
            --max-retries 2
            --timeout 30
            --root-dir ${{ github.workspace }}/_site
            --fallback-extensions html
            --exclude-path _site/assets
            --exclude '^/$'
            --exclude 'linkedin\.com'
            --exclude 'fu-berlin\.de'
            --exclude 'cyber\.harvard\.edu'
            --exclude 'doi\.org/10\.33675'
            './_site/*.html'
          fail: false
      - name: Annotate broken links with source context
        if: steps.lychee.outputs.exit_code != 0
        run: python3 scripts/link-context.py lychee/out.md >> "$GITHUB_STEP_SUMMARY"
      - name: Fail on broken links
        if: steps.lychee.outputs.exit_code != 0
        run: exit 1
