title: Dario Rodighiero
excerpt_separator: "<!--more-->"
description: Design, Data, and Humanities
url: https://dariorodighiero.com

plugins:
  - jekyll-redirect-from
  - jekyll-feed

feed:
  posts_limit: 1000
  collections:
    - publications

collections:
  publications:
    output: true
    permalink: /:name

defaults:
  - scope:
      path: ""
      type: publications
    values:
      layout: publication
